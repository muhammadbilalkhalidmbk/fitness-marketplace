{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto py-12">
  <h1 class="text-2xl font-bold mb-4">Confirm Your Subscription</h1>

  <div class="bg-white shadow p-6 rounded-lg mb-6">
    <h2 class="text-xl font-semibold">{{ plan.name }}</h2>
    <p class="text-gray-700 mb-2">{{ plan.description }}</p>
    <p><strong>Duration:</strong> {{ plan.duration_months }} month(s)</p>
    <p><strong>Price:</strong> PKR {{ plan.price }}</p>
  </div>

  <form method="POST" enctype="multipart/form-data">
  <!-- Payment Method -->
  <div class="mb-4">
    <label class="block font-medium mb-2">Select Payment Method:</label>
    <select name="payment_method" required class="w-full border rounded px-4 py-2">
      <option value="">-- Choose --</option>
      <option value="jazzcash">JazzCash +92 3145810194</option>
      <option value="easypaisa">EasyPaisa +92 3145810194</option>
      <option value="card">Credit/Debit Card</option>
    </select>
  </div>

  <!-- Upload Receipt -->
  <div class="mb-6">
    <label class="block font-medium mb-2">Upload Payment Receipt:</label>
    <input type="file" name="receipt" accept="image/*" required class="block w-full border rounded px-3 py-2">
  </div>

  <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Confirm & Subscribe</button>

    <a href="{{ url_for('customer_subscriptions') }}" class="ml-4 text-gray-600 hover:underline">Cancel</a>
  </form>
</div>
{% endblock %}
